<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сайт @trishamine</title>
    <link rel="icon" href="icon.png" type="image/png">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
        }
        h1 {
            color: #333;
            margin-top: 50px;
        }
        .button {
            padding: 10px 20px;
            font-size: 16px;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
            display: inline-block;
        }
        .youtube {
            background-color: #ff0000;
        }
        .youtube:hover {
            background-color: #cc0000;
        }
        .telegram {
            background-color: #0088cc;
        }
        .telegram:hover {
            background-color: #006699;
        }
    </style>
</head>
<body>
    <h1>Сайт @trishamine</h1>
    <button class="button youtube" onclick="window.open('https://youtube.com/@trishamine', '_blank')">YouTube</button>
    <button class="button telegram" onclick="window.open('https://t.me/trishamine', '_blank')">Telegram</button>
</body>
</html>
